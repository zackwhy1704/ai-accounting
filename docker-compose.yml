version: "3.8"

services:
  # PostgreSQL - migratable to AWS RDS
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_account
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - migratable to AWS ElastiCache or SQS
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Celery Worker (document processing)
  # worker:
  #   build: ./backend
  #   command: celery -A app.tasks.celery_app worker --loglevel=info
  #   depends_on:
  #     - db
  #     - redis
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ai_account
  #     - CELERY_BROKER_URL=redis://redis:6379/0

volumes:
  pgdata:
