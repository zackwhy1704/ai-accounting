<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Bar chart bars -->
  <rect x="18" y="58" width="14" height="34" rx="3" fill="#1E6FA8" opacity="0.85"/>
  <rect x="38" y="42" width="14" height="50" rx="3" fill="#1E6FA8"/>
  <rect x="58" y="28" width="14" height="64" rx="3" fill="#1E7CB8"/>
  <rect x="78" y="18" width="14" height="74" rx="3" fill="#1E8FC8"/>

  <!-- Trend line -->
  <polyline points="25,72 45,56 65,40 85,22" stroke="url(#trendGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Arrow tip -->
  <polyline points="78,18 92,18 92,32" stroke="url(#arrowGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Dots on line -->
  <circle cx="25" cy="72" r="3.5" fill="#4DB8E8"/>
  <circle cx="45" cy="56" r="3.5" fill="#4DB8E8"/>
  <circle cx="65" cy="40" r="3.5" fill="#4DB8E8"/>
  <circle cx="85" cy="22" r="3.5" fill="#4DB8E8"/>

  <!-- Swoosh arc underneath -->
  <path d="M 22 96 Q 60 112 98 96" stroke="url(#swooshGrad)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <defs>
    <linearGradient id="trendGrad" x1="25" y1="72" x2="92" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E7CB8"/>
      <stop offset="100%" stop-color="#5DD67A"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="78" y1="18" x2="92" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5DD67A"/>
      <stop offset="100%" stop-color="#3EC85A"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="22" y1="96" x2="98" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4DB8E8" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#4DB8E8"/>
      <stop offset="100%" stop-color="#4DB8E8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
